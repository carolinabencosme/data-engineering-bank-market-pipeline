[core]
executor = LocalExecutor
dags_folder = /opt/airflow/dags
load_examples = False

[database]
sql_alchemy_conn = postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}

[webserver]
base_url = http://localhost:8080
web_server_port = 8080