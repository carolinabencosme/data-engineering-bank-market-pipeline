name: bank_market_pipeline
version: 1.0.0
config-version: 2

profile: bank_market_pipeline

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  bank_market_pipeline:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging", "landing"]
    marts:
      +materialized: incremental
      +incremental_strategy: delete+insert
      +on_schema_change: sync_all_columns
      +schema: marts
      +tags: ["marts", "olap"]

snapshots:
  bank_market_pipeline:
    +target_schema: snapshots