version: 2

sources:
  - name: landing
    description: "Zona landing en PostgreSQL con datos crudos de mercado y fundamentales."
    schema: landing
    loader: airflow_airbyte
    meta:
      owner: data_platform
      domain: market_data
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: bank_basic_info
        description: "Información corporativa por símbolo y fecha de foto."
        meta:
          owner: finance_analytics
        columns:
          - name: symbol
            description: "Ticker bursátil."
            tests:
              - not_null
          - name: snapshot_date
            description: "Fecha de snapshot de la compañía."
            tests:
              - not_null
      - name: stock_daily_price
        description: "Precios OHLC diarios por símbolo."
        meta:
          owner: finance_analytics
        columns:
          - name: symbol
            description: "Ticker bursátil."
            tests:
              - not_null
          - name: price_date
            description: "Fecha de negociación diaria."
            tests:
              - not_null
          - name: volume
            description: "Volumen de negociación diario."
            tests:
              - not_null
      - name: bank_fundamentals
        description: "Fundamentales financieros por período."
        meta:
          owner: finance_analytics
        columns:
          - name: symbol
            description: "Ticker bursátil."
            tests:
              - not_null
          - name: period_type
            description: "Tipo de período reportado."
            tests:
              - accepted_values:
                  values: ['annual', 'quarterly', 'ttm']
      - name: holders
        description: "Posiciones de tenedores institucionales/insiders y fondos."
        meta:
          owner: finance_analytics
        columns:
          - name: symbol
            description: "Ticker bursátil."
            tests:
              - not_null
          - name: holder_type
            description: "Tipo de tenedor."
            tests:
              - accepted_values:
                  values: ['institution', 'insider', 'mutual_fund', 'major']
      - name: ratings
        description: "Calificaciones y acciones de firmas de análisis."
        meta:
          owner: finance_analytics
        columns:
          - name: symbol
            description: "Ticker bursátil."
            tests:
              - not_null