services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-postgres
    restart: unless-stopped
    env_file:
      - .env
      - ./infra/postgres/postgres.env
    environment:
      PGDATA: ${POSTGRES_PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline} -d ${POSTGRES_DB:-bank_market}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - data_plane
      - orchestration

  postgres-schema-init:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-postgres-schema-init
    restart: "no"
    env_file:
      - .env
      - ./infra/postgres/postgres.env
    volumes:
      - ./sql:/workspace/sql:ro
      - ./infra/postgres/apply_landing_schema.sh:/apply_landing_schema.sh:ro
    # Inline `command: |` with `entrypoint: [sh, -ec]` was split by Compose into many CMD
    # tokens, so almost none of the DDL ran. Use a mounted POSIX script instead.
    entrypoint: ["/bin/sh", "/apply_landing_schema.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_plane
      - orchestration
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_TAG:-24.8}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-clickhouse
    restart: unless-stopped
    env_file:
      - .env
      - ./infra/clickhouse/clickhouse.env
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom-config.xml:ro
      - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom-users.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - data_plane

  clickhouse-schema-init:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_TAG:-24.8}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-clickhouse-schema-init
    restart: "no"
    env_file:
      - .env
      - ./infra/clickhouse/clickhouse.env
    volumes:
      - ./sql:/workspace/sql:ro
      - ./infra/clickhouse/apply_olap_schema.sh:/apply_olap_schema.sh:ro
    entrypoint: ["/bin/sh", "/apply_olap_schema.sh"]
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - data_plane
      - orchestration

  airflow-init:
    image: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    build:
      context: .
      dockerfile: ./infra/airflow/Dockerfile
      args:
        AIRFLOW_BASE_IMAGE: apache/airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow-init
    restart: "no"
    env_file:
      - .env
      - ./infra/airflow/airflow.env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./infra/dbt:/opt/airflow/infra/dbt:ro
      - ./infra/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
    entrypoint:
      - /bin/bash
      - -c
    command:
      - |
        airflow db migrate && \
        airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --firstname "${AIRFLOW_ADMIN_FIRSTNAME:-Air}" \
          --lastname "${AIRFLOW_ADMIN_LASTNAME:-Flow}" \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" || true
    depends_on:
      postgres:
        condition: service_healthy
      postgres-schema-init:
        condition: service_completed_successfully
      clickhouse-schema-init:
        condition: service_completed_successfully
    networks:
      - orchestration
      - data_plane

  airflow-webserver:
    image: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    build:
      context: .
      dockerfile: ./infra/airflow/Dockerfile
      args:
        AIRFLOW_BASE_IMAGE: apache/airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow-webserver
    restart: unless-stopped
    env_file:
      - .env
      - ./infra/airflow/airflow.env
    environment:
      PYTHONPATH: /opt/airflow/pipeline
      DBT_CH_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      DBT_CH_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      DBT_CH_USER: ${CLICKHOUSE_USER:-default}
      DBT_CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      DBT_CH_DATABASE: ${DBT_CH_DATABASE:-olap}
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/pipeline/src:ro
      - ./dbt:/opt/airflow/dbt
      - ./infra/dbt:/opt/airflow/infra/dbt:ro
      - ./infra/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
    command: ["webserver"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      postgres-schema-init:
        condition: service_completed_successfully
      clickhouse-schema-init:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
    networks:
      - orchestration
      - data_plane

  airflow-scheduler:
    image: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    build:
      context: .
      dockerfile: ./infra/airflow/Dockerfile
      args:
        AIRFLOW_BASE_IMAGE: apache/airflow:${AIRFLOW_IMAGE_TAG:-2.11.2}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow-scheduler
    restart: unless-stopped
    env_file:
      - .env
      - ./infra/airflow/airflow.env
    environment:
      PYTHONPATH: /opt/airflow/pipeline
      DBT_CH_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      DBT_CH_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      DBT_CH_USER: ${CLICKHOUSE_USER:-default}
      DBT_CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      DBT_CH_DATABASE: ${DBT_CH_DATABASE:-olap}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/pipeline/src:ro
      - ./dbt:/opt/airflow/dbt
      - ./infra/dbt:/opt/airflow/infra/dbt:ro
      - ./infra/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
    command: ["scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      postgres-schema-init:
        condition: service_completed_successfully
      clickhouse-schema-init:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
    networks:
      - orchestration
      - data_plane

  dbt:
    build:
      context: .
      dockerfile: ./infra/dbt/Dockerfile
      args:
        DBT_BASE_IMAGE: ghcr.io/dbt-labs/dbt-postgres:${DBT_IMAGE_TAG:-1.8.latest}
    image: ${COMPOSE_PROJECT_NAME:-bank-market}-dbt:${DBT_IMAGE_TAG:-1.8.latest}
    container_name: ${COMPOSE_PROJECT_NAME:-bank-market}-dbt
    restart: unless-stopped
    env_file:
      - .env
      - ./infra/dbt/dbt.env
    environment:
      DBT_CH_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      DBT_CH_HTTP_PORT: ${CLICKHOUSE_HTTP_PORT:-8123}
      DBT_CH_USER: ${CLICKHOUSE_USER:-default}
      DBT_CH_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      DBT_CH_DATABASE: ${DBT_CH_DATABASE:-olap}
      DBT_PROJECT_DIR: /usr/app/dbt
      DBT_PROFILES_DIR: /root/.dbt
    # Repo root is mounted at /usr/app; dbt_project.yml lives under ./dbt
    working_dir: /usr/app/dbt
    volumes:
      - ./:/usr/app
      - ./infra/dbt/profiles.yml:/root/.dbt/profiles.yml:ro
    entrypoint: []
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "dbt --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres-schema-init:
        condition: service_completed_successfully
      clickhouse-schema-init:
        condition: service_completed_successfully
    networks:
      - data_plane
      - orchestration

networks:
  data_plane:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-data-plane
    driver: bridge

  orchestration:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-orchestration
    driver: bridge

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-postgres-data

  clickhouse_data:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-clickhouse-data

  clickhouse_logs:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-clickhouse-logs

  airflow_logs:
    name: ${COMPOSE_PROJECT_NAME:-bank-market}-airflow-logs